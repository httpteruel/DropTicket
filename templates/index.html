<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DropTicket | Explore a Batida{% block endtitle %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-cyan: #01ffff;
            --dark-bg: #0a0a0c;
            --card-bg: #16161a;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand, .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.9) !important;
            border-bottom: 1px solid var(--neon-purple);
            padding: 1rem 0;
        }

        .navbar-brand {
            color: var(--neon-cyan) !important;
            font-size: 1.5rem;
        }
        
        .navbar-nav .nav-link {
            color: #ffffff !important;
            font-weight: 600;
        }

        .navbar-nav .nav-link:hover {
            color: var(--neon-cyan) !important;
        }

        footer {
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid #2d2d35;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'evento_list' %}">DROP<span>TICKET</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'evento_list' %}">Eventos</a>
                <a class="nav-link" href="#">Sobre</a> 
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer>
        <p>&copy; 2026 DropTicket - Transformando experiências em memórias.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
